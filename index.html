<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work | Studio.</title>
<meta name="description" content="Design-study recreation of a horizontally scrolling agency case grid. Placeholder content only.">
<style>
  :root {
    --ink: #000;
    --paper: #fff;
    --accent: #d08c2e;
    --gutter: 34px;
    --card-h: clamp(320px, 52vh, 600px);
    --card-w: calc(var(--card-h) * 0.667);
    --font-sans: "Neue Haas Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
  }
  body { overflow: hidden; }

  ::selection { background: var(--ink); color: var(--paper); }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ---------- Chrome (fixed UI) ---------- */
  .logo {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 40;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.005em;
    mix-blend-mode: difference;
    color: #fff;
  }

  .menu-btn {
    position: fixed;
    right: 32px;
    bottom: 26px;
    z-index: 40;
    font-size: 16px;
    mix-blend-mode: difference;
    color: #fff;
  }

  .filter-btn {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 40;
    transform: translate(-50%, -50%);
    writing-mode: vertical-rl;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.12em;
    mix-blend-mode: difference;
    color: #fff;
  }
  .filter-btn::before {
    content: "";
    display: block;
    width: 1px;
    height: 30px;
    margin: 0 auto 10px;
    background: currentColor;
  }

  /* ---------- Horizontal gallery ---------- */
  .viewport {
    position: absolute;
    inset: 0;
    overflow: hidden;
    cursor: none;
  }

  .track {
    position: absolute;
    top: 50%;
    left: 0;
    display: flex;
    gap: var(--gutter);
    padding: 0 var(--gutter);
    transform: translateY(-50%);
    will-change: transform;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: var(--gutter);
    flex: 0 0 var(--card-w);
    transform: translateY(var(--col-shift, 0px));
  }

  .card {
    position: relative;
    width: var(--card-w);
    display: block;
    opacity: 0;
    animation: card-in .8s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card .frame {
    position: relative;
    width: 100%;
    height: var(--card-h);
    overflow: hidden;
    background: #e8e5e0;
  }
  /* secondary aspect ratio seen in the grid: 3:4 instead of 2:3 */
  .card.short .frame { height: calc(var(--card-w) / 0.751); }

  .card .visual {
    position: absolute;
    inset: 0;
    transform: scale(1.001);
    transition: transform .7s cubic-bezier(.16,1,.3,1);
  }
  .card:hover .visual { transform: scale(1.05); }
  .visual img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* bottom scrim so overlaid captions stay legible on any photo */
  .card .frame::after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 38%;
    z-index: 1;
    background: linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,0));
    pointer-events: none;
  }

  .card .tag {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 2;
    padding: 5px 16px;
    border-radius: 38px;
    font-size: 14px;
    color: #fff;
    background: rgba(0,0,0,.2);
    backdrop-filter: blur(3.2px);
    -webkit-backdrop-filter: blur(3.2px);
    white-space: nowrap;
  }

  .card .caption {
    position: absolute;
    left: 16px;
    bottom: 14px;
    right: 16px;
    z-index: 2;
    font-size: 14px;
    line-height: 1.2;
    color: #fff;
  }
  .caption .name { text-transform: uppercase; }
  .caption .sep { opacity: .55; padding: 0 1px; }

  /* ---------- Custom cursor ---------- */
  .cursor {
    position: fixed;
    z-index: 60;
    top: 0; left: 0;
    width: 44px; height: 44px;
    margin: -22px 0 0 -22px;
    border-radius: 50%;
    background: var(--accent);
    pointer-events: none;
    opacity: 0;
    transform: scale(1);
    transition: transform .3s cubic-bezier(.16,1,.3,1), opacity .3s;
  }
  .cursor.is-down { transform: scale(.75); }
  .cursor.is-hover { transform: scale(1.3); }
  @media (hover: none) { .cursor { display: none; } .viewport { cursor: auto; } }

  /* ---------- Filter overlay ---------- */
  .filters {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    opacity: 0;
    visibility: hidden;
    transition: opacity .4s, visibility .4s;
  }
  .filters.is-open { opacity: 1; visibility: visible; }

  .filters button {
    font-size: clamp(28px, 5vw, 56px);
    line-height: 1.15;
    color: rgba(0,0,0,.3);
    transition: color .25s;
  }
  .filters button:hover, .filters button.is-active { color: var(--ink); }

  .filters .close {
    position: absolute;
    top: 28px;
    right: 32px;
    font-size: 15px;
    color: var(--ink);
  }

  .credit {
    position: fixed;
    left: 50%;
    bottom: 10px;
    transform: translateX(-50%);
    z-index: 40;
    font-size: 10px;
    color: #fff;
    opacity: .6;
    mix-blend-mode: difference;
    letter-spacing: .02em;
    white-space: nowrap;
  }

  /* ---------- Vertical feed on narrow / portrait screens ---------- */
  @media (max-width: 820px) {
    body { overflow: auto; }
    .viewport { position: static; overflow: visible; cursor: auto; }
    .track {
      position: static;
      transform: none !important;
      flex-direction: column;
      align-items: center;
      gap: var(--gutter);
      padding: 90px 0 120px;
    }
    .col {
      flex: none;
      transform: none;
      align-items: center;
    }
    .card { width: min(86vw, 453px); }
    .card .frame, .card.short .frame { height: calc(min(86vw, 453px) / 0.751); }
    .card .caption { text-align: center; }
    .filter-btn { display: none; }
    .cursor { display: none; }
  }
</style>
</head>
<body>

  <a class="logo" href="#" aria-label="Home">Studio.</a>

  <div class="viewport" id="viewport">
    <div class="track" id="track"></div>
  </div>

  <button class="filter-btn" id="filterBtn">Filter work</button>
  <button class="menu-btn">Menu</button>

  <div class="filters" id="filters">
    <button class="close" data-close>Close</button>
  </div>

  <div class="cursor" id="cursor"></div>

  <p class="credit">Design study — placeholder content, not affiliated with any agency</p>

<script>
  /* ---------- Placeholder data (original, non-affiliated) ---------- */
  const CASES = [
    { name: "Aurora",        desc: "A flagship store built to last" },
    { name: "Fern & Co",     desc: "A new identity and a store that scales", tag: "Newly Added" },
    { name: "Meridian",      desc: "Quiet luxury, engineered in detail", tag: "Shopify" },
    { name: "Kinetic Lab",   desc: "Performance wear, proven in the lab" },
    { name: "Summit Co",     desc: "Built for the mountains" },
    { name: "Lumen Museum",  desc: "A digital home for photography", short: true },
    { name: "Expedition 9",  desc: "A journey you can shop" },
    { name: "Groundwork",    desc: "Architecture with a point of view" },
    { name: "Paygrid",       desc: "Payments that get out of the way", short: true },
    { name: "Instantly",     desc: "A headless flagship, rebuilt from scratch", tag: "Headless Shopify" },
    { name: "Trailsystem",   desc: "A footwear launch, from teaser to checkout", tag: "Headless Shopify" },
    { name: "Triline",       desc: "One design system for every touchpoint" },
    { name: "Club Spirit",   desc: "A club platform with real energy", tag: "Shopify" },
    { name: "Curveform",     desc: "Typography, pushed to the front" },
    { name: "Rotate Studio", desc: "Branding in constant motion", short: true },
    { name: "Open Walls",    desc: "An exhibition beyond the gallery" },
    { name: "Essence",       desc: "A scent you can almost smell" },
    { name: "Giftfinder",    desc: "An immersive way to find the right gift", tag: "Most Awarded", short: true },
    { name: "Maison V",      desc: "Parisian craft, digital polish" },
    { name: "Framecam",      desc: "A campaign site for a cult camera", tag: "Shopify" },
    { name: "The Cask",      desc: "A slow story, well aged" },
    { name: "Land of Ride",  desc: "Adventure, mapped out", tag: "Shopify" },
    { name: "Pocketful",     desc: "Small goods, big ideas", short: true },
    { name: "Talent 21",     desc: "A show designed for slow browsing", tag: "Most Awarded" },
    { name: "Sensorial",     desc: "A store for all five senses" },
    { name: "Alpenglow",     desc: "A rebrand from label to landing page", tag: "Shopify" },
    { name: "Three Brands",  desc: "Three labels, one checkout", short: true },
    { name: "Streetlux",     desc: "Streetwear, sold like couture", tag: "Shopify" },
    { name: "Framewear",     desc: "Eyewear for every channel" },
    { name: "Lifeform",      desc: "A platform inspired by living things", tag: "Newly Added" },
    { name: "Art Piece",     desc: "One artwork, one URL", short: true },
    { name: "Destinations",  desc: "Destinations in the making" },
  ];

  const COL_SHIFTS = [0, 90, -60, 110, 35, -40, 80, -25];

  /* ---------- Render ---------- */
  const track = document.getElementById("track");
  let target = 0, current = 0;

  function cardEl(c, i) {
    const a = document.createElement("a");
    a.href = "#";
    a.className = "card" + (c.short ? " short" : "");
    a.dataset.tag = c.tag || "";
    a.style.animationDelay = Math.min(i * 45, 700) + "ms";
    const seed = c.name.toLowerCase().replace(/[^a-z0-9]/g, "");
    const dims = c.short ? "600/800" : "600/900";
    a.innerHTML = `
      <div class="frame">
        <div class="visual">
          <img src="https://picsum.photos/seed/${seed}/${dims}" alt="${c.name} — placeholder image" loading="lazy">
        </div>
        ${c.tag ? `<span class="tag">${c.tag}</span>` : ""}
        <p class="caption"><span class="name">${c.name}</span><span class="sep"> · </span>${c.desc}</p>
      </div>`;
    return a;
  }

  function layout(list) {
    track.innerHTML = "";
    let col = null, colIndex = 0;
    list.forEach((c, i) => {
      if (!col || col.dataset.count >= 2) {
        col = document.createElement("div");
        col.className = "col";
        col.dataset.count = 0;
        col.style.setProperty("--col-shift", COL_SHIFTS[colIndex % COL_SHIFTS.length] + "px");
        track.appendChild(col);
        colIndex++;
      }
      col.appendChild(cardEl(c, c._i ?? i));
      col.dataset.count = +col.dataset.count + 1;
    });
    target = 0; current = 0;
  }

  CASES.forEach((c, i) => { c._i = i; });
  layout(CASES);

  /* ---------- Smooth horizontal scroll (wheel + drag) ---------- */
  const viewport = document.getElementById("viewport");
  const isDesktop = () => matchMedia("(min-width: 821px)").matches;
  let dragging = false, dragStartX = 0, dragStartTarget = 0;

  const maxScroll = () => Math.max(0, track.scrollWidth - viewport.clientWidth);

  viewport.addEventListener("wheel", (e) => {
    if (!isDesktop()) return;
    e.preventDefault();
    target += (Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY) * 1.1;
  }, { passive: false });

  viewport.addEventListener("pointerdown", (e) => {
    if (!isDesktop()) return;
    dragging = true; dragStartX = e.clientX; dragStartTarget = target;
    cursor.classList.add("is-down");
  });
  window.addEventListener("pointermove", (e) => {
    if (dragging) target = dragStartTarget - (e.clientX - dragStartX) * 1.6;
  });
  window.addEventListener("pointerup", () => {
    dragging = false; cursor.classList.remove("is-down");
  });

  function tick() {
    if (isDesktop()) {
      target = Math.max(0, Math.min(maxScroll(), target));
      current += (target - current) * 0.08;
      track.style.transform = `translate3d(${-current}px, -50%, 0)`;
    }
    requestAnimationFrame(tick);
  }
  tick();

  /* ---------- Custom cursor ---------- */
  const cursor = document.getElementById("cursor");
  window.addEventListener("pointermove", (e) => {
    cursor.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
    const overCard = e.target.closest && e.target.closest(".card");
    cursor.classList.toggle("is-hover", !!overCard);
    cursor.style.opacity = e.target.closest && e.target.closest(".viewport, .card") ? 1 : 0;
  });

  /* ---------- Filters ---------- */
  const filters = document.getElementById("filters");
  const TAGS = ["All", ...new Set(CASES.map((c) => c.tag).filter(Boolean))];
  TAGS.forEach((t) => {
    const b = document.createElement("button");
    b.textContent = t;
    if (t === "All") b.classList.add("is-active");
    b.addEventListener("click", () => {
      filters.querySelectorAll("button").forEach((x) => x.classList.remove("is-active"));
      b.classList.add("is-active");
      layout(t === "All" ? CASES : CASES.filter((c) => c.tag === t));
      filters.classList.remove("is-open");
    });
    filters.insertBefore(b, filters.querySelector(".close"));
  });
  document.getElementById("filterBtn").addEventListener("click", () => filters.classList.add("is-open"));
  filters.querySelector("[data-close]").addEventListener("click", () => filters.classList.remove("is-open"));
  window.addEventListener("keydown", (e) => { if (e.key === "Escape") filters.classList.remove("is-open"); });
</script>
</body>
</html>
